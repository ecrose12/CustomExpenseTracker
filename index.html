<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fully Involved Construction, LLC — Expense Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="index.css"/>
</head>
<body>

<div class="page-header">
  <div class="header-left">
    <img class="logo-img" src="logo.png" alt="Fully Involved Construction, LLC Logo"/>
    <div class="header-titles">
      <h1>Fully Involved Construction, LLC</h1>
      <p class="header-subtitle">Business Expense Tracker</p>
    </div>
  </div>
  <span class="header-tag">For Internal Use Only</span>
</div>

<div class="container">

  <!-- Form -->
   
  <div class="form-card">
    <div class="form-card-title">Log an Expense</div>
    <form id="expenseForm" novalidate>
      <div class="form-grid">
        <div class="field">
          <label for="description">Expense Description</label>
          <input type="text" id="description" placeholder="e.g. Fuel" autocomplete="off"/>
        </div>
        <div class="field">
          <label for="details">Additional Details <span class="optional">(optional)</span></label>
          <input type="text" id="details" placeholder="e.g. Job ID, Truck #626" autocomplete="off"/>
        </div>
        <div class="field">
          <label for="amount">Amount ($)</label>
          <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01"/>
        </div>
        <div class="field">
          <label for="category">Category</label>
          <select id="category">
            <option value="">Select…</option>
          </select>
        </div>
        <div class="field submit-wrap">
          <div class="btn-row">
            <button type="submit" id="submitBtn">Add Expense</button>
            <button type="button" id="cancelBtn" title="Cancel edit">✕</button>
          </div>
        </div>
      </div>
      <div id="errorMsg"></div>
    </form>
  </div>

  <!-- Table -->

  <div class="section-header">
    <h2>Expense Log</h2>
    <div class="total-badge">Total: <span id="totalAmount">$0.00</span></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Description</th>
          <th>Details</th>
          <th>Amount</th>
          <th>Category</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="expenseTableBody"></tbody>
      <tfoot>
        <tr>
          <td colspan="3" style="text-align:right;">Total</td>
          <td id="totalAmountFoot">$0.00</td>
          <td colspan="2"></td>
        </tr>
      </tfoot>
    </table>
    <p id="emptyMsg">No expenses logged yet.</p>
  </div>

</div>

<script src="index.js"></script>
</body>
</html>
